<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="A magical documentation generator.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
    <title>TspaceSpear</title>
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/thanathip41/tspace-mysql/refs/heads/master/docs/images/TspaceSpear-Fav.png">
    <meta name="description"
        content="Type-safe MySQL ORM for Node.js with deeply nested relations, migrations, and more.">
    <meta name="keywords"
        content="tspace, tspace-mysql, TspaceSpear , TspaceSpear, mysql, mysql2, orm, ORM, relations, deeply nested relations, object relation model, model, database, query builder, transaction, commit, rollback, cli, migrate, backup, blueprint, repository, type safety, typescript">
    <meta name="author" content="Thanathip">

    <meta property="og:title" content="tspace-mysql Documentation">
    <meta property="og:description"
        content="Type-safe MySQL ORM for Node.js with deeply nested relations, migrations, and more.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thanathip41.github.io/tspace-mysql">
    <meta property="og:image"
        content="https://raw.githubusercontent.com/thanathip41/tspace-mysql/refs/heads/master/docs/images/TspaceSpear-Logo.png">
    <style>
        #app {
            max-width: 100%;
            padding: 20px 40px;
        }

        .markdown-section {
            max-width: 95%;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 16px;
        }

        .markdown-section pre[data-lang]::after {
            display: none;
        }

        .copy-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            position: absolute;
            top: 6px;
            right: 6px;
            z-index: 10;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .app-name img {
            width: 100%;
            height: 64px;
            object-fit: cover;
            border-radius: 5px;
            padding: 0;
            margin: 0;
            vertical-align: middle;
        }

        .page-nav-cards {
            display: flex;
            justify-content: space-between;
            margin: 2em 0;
            gap: 1em;
        }

        .page-nav-cards a {
            flex: 1;
            display: block;
            padding: 1em 0.75em;
            border-radius: 0.5em;
            background-color: #14181d;
            color: #fff;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .page-nav-cards a:hover {
            background-color: #374151;
            transform: translateY(-2px);
        }

        .page-nav-cards .nav-label {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .page-nav-cards .nav-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-top: 0.2em;
        }

        .next-card {
            text-align: right;
        }

        .page-nav-arrow {
            color: #fff;
            font-size: 16px;
        }

        .app-nav {
            position: fixed;
            background-color: #14181d;
            width: 100%;
            text-align: center;
            z-index: 10;
            top: 0;
            left: 0;
            right: 0;
        }

        .app-nav .active {
            color: #0B87DA;
            font-size: 1.1rem
        }

        .app-nav p {
            color: #D3D3D3
        }

        .app-nav a {
            color: #D3D3D3
        }

        @media (max-width: 640px) {
            .app-nav {
                visibility: hidden;
            }

            .page-nav-cards {
                margin: 1em 0;
                gap: 1em;
            }

            .page-nav-cards {
                font-size: 12px;
            }

            .page-nav-cards a {
                flex: 1;
                display: block;
                padding: 0.75em 0.75em;
                border-radius: 0.5em;
                background-color: #14181d;
                color: #fff;
                text-decoration: none;
                transition: transform 0.2s, background-color 0.2s;
                width: 50%;
            }

            .markdown-section {
                width: 100%;
                padding: 1rem 0.8rem;
            }
        }
    </style>

    <style>
        #chat-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #000;
            opacity: 0.9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            z-index: 999;
        }

        #chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            z-index: 1000;
        }

        #chat-window {
            width: 90%;
            max-width: 800px;
            min-width: 450px;
            max-height: 90%;
            min-height: 500px;
            background: #f9f9f9;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #333;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        #chat-window header {
            background: #000;
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-window strong {
            color: #000;
        }

        #chat-close {
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 15px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.user div {
            background: #333;
            color: #fff;
            padding: 10px 14px;
            border-radius: 18px 18px 0 18px;
            max-width: 80%;
            word-break: break-word;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message.bot div {
            background: #e0e0e0;
            color: #111;
            padding: 10px 14px;
            border-radius: 18px 18px 18px 0;
            max-width: 80%;
            word-break: break-word;
        }

        #chat-input-container {
            display: flex;
            border-top: 2px solid #ccc;
            background: #333;
            padding: 0.5rem;
            gap: 0.5rem;
        }

        #chat-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 25px;
            background: #fff;
            color: #111;
        }

        #chat-input:focus {
            outline: none;
            border-color: #333;
        }

        #chat-send {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        #chat-send:hover {
            background: #555;
        }

        pre {
            background: #eee;
            color: #333;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            width: 100%;
        }

        code {
            font-family: monospace;
            color: #111;
        }

        #chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 4px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: #f9f9f9;
        }

        @media (max-width: 600px) {
            #chat-window {
                width: 100%;
                max-width: 100%;
                min-width: 100%;
                height: 100%;
                max-height: 100%;
                min-height: 100%;
                border-radius: 0;
                top: 0;
                left: 0;
            }

            #chat-window header {
                font-size: 20px;
                padding: 1rem;
            }

            #chat-input {
                font-size: 15px;
                padding: 12px;
            }
        }

        .match-keyword {
            background-color: #ffeb3b;
            color: #000;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .match-keyword:hover {
            background-color: #fdd835;
            cursor: pointer;
        }

        .docsify-tabs__content {
            padding: 0 !important;
        }

        .app-name {
            visibility: hidden !important;
        }
    </style>
</head>

<body>
    <div id="app"></div>
</body>
<script>
    window.$docsify = {
        name: "TspaceSpear",
        repo: 'https://github.com/thanathip41/tspace-mysql',
        loadSidebar: 'sidebar.md',
        subMaxLevel: 0,
        themeable: true,
        auto2top: true,
        plugins: [
            function (hook, vm) {
                hook.doneEach(function () {
                    document.querySelectorAll('pre[data-lang]').forEach(block => {
                        if (!block.querySelector('.copy-btn')) {
                            const button = document.createElement('button')
                            button.textContent = 'Copy'
                            button.className = 'copy-btn'
                            button.onclick = () => {
                                navigator.clipboard
                                    .writeText(String(block.innerText).replace('Copy', ''));

                                button.textContent = 'Copied!'
                                setTimeout(() => (button.textContent = 'Copy'), 2000)
                            }
                            block.style.position = 'relative'
                            button.style.position = 'absolute'
                            button.style.top = '8px'
                            button.style.right = '8px'
                            block.appendChild(button)
                        }
                    })
                })
            }
        ],
        tabs: {
            persist: true
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
</html>
